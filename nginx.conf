server {
    listen 80;

    # Pricing page
    location /pricing {
        alias /usr/share/nginx/html/pricing.html;
        default_type text/html;
    }

    # Nexus dashboard
    location /nexus/ {
        alias /usr/share/nginx/html/nexus/;
        try_files $uri $uri/ /nexus/dashboard.html;
    }

    # Proxy all API calls to backend
    location /api/ {
        proxy_pass http://nexus-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Sandbox playground (root)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
