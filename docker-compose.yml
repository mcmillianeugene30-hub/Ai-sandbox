version: '3.8'

services:
  nexus-backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./backend/usage.db:/app/backend/usage.db
      - ./nexus-ai-os/memory_db:/app/nexus-ai-os/memory_db
      - ./nexus-ai-os/projects:/app/nexus-ai-os/projects
    restart: always

  # Simple static server for frontend
  nexus-frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nexus-ai-os/frontend:/usr/share/nginx/html/nexus
    restart: always
