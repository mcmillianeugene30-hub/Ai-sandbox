version: '3.8'

services:
  nexus-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PYTHONPATH=/app
    volumes:
      - ./backend/usage.db:/app/backend/usage.db
      - ./nexus-ai-os/memory_db:/app/nexus-ai-os/memory_db
      - ./nexus-ai-os/projects:/app/nexus-ai-os/projects
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/billing/plans"]
      interval: 30s
      timeout: 10s
      retries: 3

  nexus-frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nexus-ai-os/frontend:/usr/share/nginx/html/nexus
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nexus-backend
    restart: unless-stopped
