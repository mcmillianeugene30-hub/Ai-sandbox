services:
  - type: web
    name: nexus-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/backend:/opt/render/project/src
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NEXUS_OS_PATH
        value: /opt/render/project/src/nexus-ai-os
      - key: RENDER_DISK_PATH
        value: /opt/render/project/src/backend/data
      - key: CHROMA_DB_PATH
        value: /opt/render/project/src/backend/chroma_db
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TOKEN_EXP_MINUTES
        value: "600"
      - key: FRONTEND_URL
        sync: false
      - key: RENDER_SERVICE_URL
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
    disk:
      name: nexus-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
