services:
  # 1. The Backend (Python FastAPI)
  - type: web
    name: nexus-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: ./build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/backend:/opt/render/project/src
      - key: NEXUS_OS_PATH
        value: /opt/render/project/src/nexus-ai-os
      - key: RENDER_DISK_PATH
        value: /opt/render/project/src/backend/data
      - key: CHROMA_DB_PATH
        value: /opt/render/project/src/backend/chroma_db
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TOKEN_EXP_MINUTES
        value: "600"

  # 2. The Frontend (Static Dashboard)
  - type: static
    name: nexus-dashboard
    runtime: static
    region: oregon
    buildCommand: ./build-frontend.sh
    staticPublishPath: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nexus-backend
          property: host
